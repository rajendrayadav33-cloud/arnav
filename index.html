<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Task Manager + Alarm</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
transition:.25s;
}

body{
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--primary:#38bdf8;
--border:#334155;
background:var(--bg);
color:var(--text);
padding:20px;
min-height:100vh;
}

/* Themes */
body.light{--bg:#f8fafc;--card:#fff;--text:#111827;--muted:#64748b;--primary:#2563eb;--border:#e2e8f0;}
body.blue{--bg:#082f49;--card:#075985;--text:#e0f2fe;--muted:#bae6fd;--primary:#38bdf8;--border:#0284c7;}
body.purple{--bg:#2e1065;--card:#581c87;--text:#f3e8ff;--muted:#d8b4fe;--primary:#c084fc;--border:#7e22ce;}
body.green{--bg:#052e16;--card:#14532d;--text:#dcfce7;--muted:#86efac;--primary:#22c55e;--border:#15803d;}
body.red{--bg:#450a0a;--card:#7f1d1d;--text:#fee2e2;--muted:#fca5a5;--primary:#ef4444;--border:#b91c1c;}
body.orange{--bg:#431407;--card:#9a3412;--text:#ffedd5;--muted:#fdba74;--primary:#f97316;--border:#ea580c;}
body.pink{--bg:#500724;--card:#9d174d;--text:#fce7f3;--muted:#f9a8d4;--primary:#ec4899;--border:#db2777;}

.container{max-width:1300px;margin:auto;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
padding:20px;
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
margin-bottom:20px;
}

.title{font-size:28px;font-weight:700;}
.clock{color:var(--primary);font-size:14px;font-weight:600;}

.search{
padding:12px;
border:none;
outline:none;
border-radius:12px;
background:var(--bg);
color:var(--text);
min-width:220px;
}

.theme-box{display:flex;gap:8px;flex-wrap:wrap;}

.theme-btn{
border:none;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
background:var(--bg);
color:var(--text);
font-size:12px;
font-weight:600;
}

.quote,.box,.task{
background:var(--card);
border:1px solid var(--border);
}

.quote{
padding:18px;
border-radius:18px;
text-align:center;
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-bottom:20px;
}

.box{
padding:18px;
border-radius:18px;
text-align:center;
}

.box h2{
font-size:28px;
color:var(--primary);
}

.form{
display:grid;
grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr auto;
gap:10px;
margin-bottom:20px;
}

.form input,.form select,.form button{
padding:12px;
border:none;
border-radius:12px;
outline:none;
background:var(--bg);
color:var(--text);
}

.form button{
background:var(--primary);
color:white;
font-weight:700;
cursor:pointer;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters button{
padding:10px 16px;
border:none;
border-radius:30px;
cursor:pointer;
background:var(--card);
color:var(--text);
}

.filters .active{
background:var(--primary);
color:white;
}

.task-list{
display:flex;
flex-direction:column;
gap:14px;
}

.task{
padding:16px;
border-radius:18px;
display:grid;
grid-template-columns:2fr 1fr auto;
gap:15px;
align-items:center;
border-left:5px solid var(--primary);
}

.task.completed{
opacity:.6;
text-decoration:line-through;
}

.name{
font-size:18px;
font-weight:600;
margin-bottom:8px;
}

.meta{
font-size:13px;
color:var(--muted);
line-height:1.7;
}

.timer{
font-size:21px;
font-weight:700;
text-align:center;
}

.good{color:#22c55e;}
.warn{color:#f59e0b;}
.bad{color:#ef4444;}

.actions{
display:flex;
gap:8px;
}

.actions button{
border:none;
padding:10px 12px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.done{background:#22c55e;color:white;}
.edit{background:#6366f1;color:white;}
.del{background:#ef4444;color:white;}

.empty{
text-align:center;
padding:40px;
opacity:.7;
}

@media(max-width:1000px){
.form{grid-template-columns:1fr;}
.task{grid-template-columns:1fr;}
.search{width:100%;}
}
</style>
</head>

<body class="dark">
<div class="container">

<div class="header">
<div>
<div class="title">⚡ Premium Task Manager</div>
<div class="clock" id="clock"></div>
</div>

<input class="search" id="searchBox" placeholder="Search tasks...">

<div class="theme-box">
<button class="theme-btn" onclick="theme('dark')">🌙</button>
<button class="theme-btn" onclick="theme('light')">☀️</button>
<button class="theme-btn" onclick="theme('blue')">💙</button>
<button class="theme-btn" onclick="theme('purple')">💜</button>
<button class="theme-btn" onclick="theme('green')">💚</button>
<button class="theme-btn" onclick="theme('red')">❤️</button>
<button class="theme-btn" onclick="theme('orange')">🧡</button>
<button class="theme-btn" onclick="theme('pink')">💗</button>
</div>
</div>

<div class="quote" id="quote"></div>

<div class="stats">
<div class="box"><h2 id="total">0</h2>Total</div>
<div class="box"><h2 id="pending">0</h2>Pending</div>
<div class="box"><h2 id="done">0</h2>Completed</div>
<div class="box"><h2 id="late">0</h2>Overdue</div>
</div>

<div class="form">

<input id="title" placeholder="Task title">

<select id="category">
<option>Study</option>
<option>Work</option>
<option>Health</option>
<option>Personal</option>
</select>

<select id="priority">
<option>Low</option>
<option selected>Medium</option>
<option>High</option>
</select>

<select id="alarmTime">
<option value="10">10 Min Alarm</option>
<option value="20">20 Min Alarm</option>
<option value="30">30 Min Alarm</option>
<option value="40">40 Min Alarm</option>
<option value="60">1 Hour Alarm</option>
</select>

<input type="date" id="date">

<select id="hour"></select>
<select id="minute"></select>

<select id="ampm">
<option>AM</option>
<option>PM</option>
</select>

<button onclick="addTask()">Add</button>

</div>

<div class="filters">
<button class="active" onclick="setFilter('all',this)">All</button>
<button onclick="setFilter('pending',this)">Pending</button>
<button onclick="setFilter('completed',this)">Completed</button>
<button onclick="setFilter('overdue',this)">Overdue</button>
</div>

<div class="task-list" id="list"></div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";
let searchText = "";
let ringing = false;
let ringInterval = null;

const quotes = [
"Discipline beats motivation.",
"Start now. Perfect later.",
"Small progress is still progress.",
"Focus creates success.",
"Consistency wins everything."
];

quote.innerText = quotes[Math.floor(Math.random()*quotes.length)];

function fillTime(){
for(let i=1;i<=12;i++){
hour.innerHTML += `<option>${String(i).padStart(2,'0')}</option>`;
}
for(let i=0;i<60;i++){
minute.innerHTML += `<option>${String(i).padStart(2,'0')}</option>`;
}
}
fillTime();

function theme(name){
document.body.className = name;
localStorage.setItem("theme",name);
}
theme(localStorage.getItem("theme") || "dark");

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function updateClock(){
clock.innerText = new Date().toLocaleString("en-IN");
}
setInterval(updateClock,1000);
updateClock();

searchBox.oninput = e=>{
searchText = e.target.value.toLowerCase();
render();
};

function addTask(){

let t = title.value.trim();
if(!t || !date.value){
alert("Fill fields first 😑");
return;
}

let h = parseInt(hour.value);
let m = minute.value;
let ap = ampm.value;

if(ap==="PM" && h!==12) h += 12;
if(ap==="AM" && h===12) h = 0;

h = String(h).padStart(2,'0');

tasks.unshift({
id:Date.now(),
title:t,
category:category.value,
priority:priority.value,
alarm:parseInt(alarmTime.value),
datetime:`${date.value}T${h}:${m}`,
completed:false,
dismissed:false,
alarmDone:false
});

title.value="";
save();
render();
}

function setFilter(type,btn){
filter = type;
document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
render();
}

function left(dt){
let now = new Date();
let target = new Date(dt);
let diff = target-now;

if(diff<=0) return {text:"OVERDUE",cls:"bad"};

let sec=Math.floor(diff/1000)%60;
let min=Math.floor(diff/60000)%60;
let hr=Math.floor(diff/3600000)%24;
let day=Math.floor(diff/86400000);

let txt = day>0 ? `${day}d ${hr}h`
: hr>0 ? `${hr}h ${min}m`
: `${min}m ${sec}s`;

let cls="good";
if(day===0 && hr<3) cls="warn";
if(day===0 && hr===0 && min<30) cls="bad";

return {text:txt,cls};
}

function toggle(id){
let task = tasks.find(x=>x.id==id);
task.completed=!task.completed;
save();
render();
}

function del(id){
if(confirm("Delete task?")){
tasks = tasks.filter(x=>x.id!=id);
save();
render();
}
}

function editTask(id){
let task = tasks.find(x=>x.id==id);
let val = prompt("Edit task:",task.title);
if(val && val.trim()){
task.title = val.trim();
save();
render();
}
}

/* Alarm System */

if("Notification" in window){
Notification.requestPermission();
}

function startAlarm(task){

if(ringing) return;
ringing = true;

if(Notification.permission==="granted"){
new Notification("⏰ Reminder",{body:task.title+" is due soon!"});
}

ringInterval = setInterval(()=>{
let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
audio.play();
},2500);

let pop = document.createElement("div");
pop.id="alarmPopup";
pop.style = `
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
color:white;
padding:30px;
border-radius:20px;
z-index:9999;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.4);
`;

pop.innerHTML = `
<h2>⏰ Reminder</h2>
<p style="margin:15px 0">${task.title}</p>
<button onclick="dismissAlarm(${task.id})"
style="padding:12px 20px;border:none;background:red;color:white;border-radius:10px;cursor:pointer;">
Dismiss
</button>
`;

document.body.appendChild(pop);
}

function dismissAlarm(id){
let task = tasks.find(x=>x.id==id);
if(task) task.dismissed = true;
clearInterval(ringInterval);
ringing=false;
document.getElementById("alarmPopup")?.remove();
save();
}

function checkAlarms(){

let now = new Date();

tasks.forEach(task=>{

if(task.completed || task.dismissed || task.alarmDone) return;

let target = new Date(task.datetime);
let diff = (target-now)/60000;

if(diff<=task.alarm && diff>0){
task.alarmDone=true;
save();
startAlarm(task);
}

});

}
setInterval(checkAlarms,1000);

function render(){

let data=[...tasks];

if(filter==="pending") data=data.filter(x=>!x.completed);
if(filter==="completed") data=data.filter(x=>x.completed);
if(filter==="overdue") data=data.filter(x=>!x.completed && new Date(x.datetime)<new Date());

if(searchText){
data=data.filter(x=>x.title.toLowerCase().includes(searchText));
}

total.innerText = tasks.length;
done.innerText = tasks.filter(x=>x.completed).length;
pending.innerText = tasks.filter(x=>!x.completed).length;
late.innerText = tasks.filter(x=>!x.completed && new Date(x.datetime)<new Date()).length;

if(data.length===0){
list.innerHTML=`<div class="empty">No tasks found ✨</div>`;
return;
}

list.innerHTML = data.map(t=>{

let tm = left(t.datetime);

return `
<div class="task ${t.completed?'completed':''}">
<div>
<div class="name">${t.title}</div>
<div class="meta">
📁 ${t.category}<br>
⭐ ${t.priority}<br>
📅 ${new Date(t.datetime).toLocaleString("en-IN")}<br>
🔔 Alarm: ${t.alarm} min before
</div>
</div>

<div class="timer ${tm.cls}">
${t.completed?'DONE ✅':tm.text}
</div>

<div class="actions">
<button class="done" onclick="toggle(${t.id})">${t.completed?'Undo':'Done'}</button>
<button class="edit" onclick="editTask(${t.id})">Edit</button>
<button class="del" onclick="del(${t.id})">Delete</button>
</div>
</div>
`;

}).join("");

}

setInterval(render,1000);
render();
</script>
</body>
</html>
